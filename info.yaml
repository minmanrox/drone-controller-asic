# Tiny Tapeout project information
project:
  title:        "Drone Flight Controller"      # Project title
  author:       "Kyle Minihan"      # Your name
  discord:      "minmanrox"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A simple flight controller for a quadcopter drone."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_minmanrox_drone"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_minmanrox_drone.v"
    - "top_module.v"
    - "mixer.v"
    - "mix_to_pwm.v"
    - "pwm_to_mix.v"
    - "system_params.vh"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: "Throttle PWM in"
  ui[2]: "Yaw PWM in"
  ui[3]: "Pitch PWM in"
  ui[4]: "Roll PWM in"
  ui[5]: "Arm PWM in"
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Motor 1 (FL, CCW) PWM out"
  uo[1]: "Motor 2 (FR,  CW) PWM out"
  uo[2]: "Motor 3 (RR, CCW) PWM out"
  uo[3]: "Motor 4 (RL,  CW) PWM out"
  uo[4]: ""
  uo[5]: "Armed LED"
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
